# Railway project config for Spider Panel

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
cronDeploy = false

# TCP Proxy for Xray/VLESS
[[services]]
name = "spider-panel"

[[services.ports]]
type = "tcp"
port = 443

[env]
PORT = "8000"
XRAY_PORT = "443"
DATABASE_URL = "sqlite+aiosqlite:///./data/spider.db"
XRAY_BINARY_PATH = "/usr/local/bin/xray"
LOG_LEVEL = "INFO"

# IMPORTANT:
# Set ADMIN_PASSWORD and SECRET_KEY in Railway Variables.
# The application will automatically use:
# RAILWAY_TCP_PROXY_DOMAIN
# RAILWAY_TCP_PROXY_PORT
# to generate public VLESS links.
