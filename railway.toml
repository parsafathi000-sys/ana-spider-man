# Railway project config for Spider Panel
# Railway auto-detects the Dockerfile. We only declare the TCP proxy so the
# public VLESS link uses Railway's TCP proxy domain/port (never the internal
# web port). The app reads RAILWAY_TCP_PROXY_DOMAIN / _PORT automatically.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
healthcheckPath = "/api/healthz"
healthcheckTimeout = 100
cronDeploy = false

# The web dashboard is reached over HTTP(s); the VLESS proxy needs a TCP proxy.
# Railway exposes these as RAILWAY_TCP_PROXY_DOMAIN / RAILWAY_TCP_PROXY_PORT.
[[services]]
name = "spider-panel"

[[services.ports]]
type = "tcp"
port = 443
# XRAY_PORT is configurable; default 443. Railway will assign a public
# TCP proxy domain+port that the app picks up via env.

[env]
PORT = "8000"
XRAY_PORT = "443"
DATABASE_URL = "sqlite+aiosqlite:///./data/spider.db"
XRAY_BINARY_PATH = "/usr/local/bin/xray"
LOG_LEVEL = "INFO"
# IMPORTANT: set ADMIN_PASSWORD + SECRET_KEY in the Railway dashboard.
# PUBLIC links auto-use RAILWAY_TCP_PROXY_DOMAIN / _PORT.
