<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#070509" />
  <title>Spider Panel — Subscription</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='10' fill='%23ff2d55'/%3E%3C/svg%3E" />
</head>
<body>
  <canvas id="bg-canvas" aria-hidden="true"></canvas>
  <div class="bg-fallback" aria-hidden="true"></div>

  <a id="tg-fab" class="tg-fab" href="https://t.me/amirsplder" target="_blank" rel="noopener noreferrer" aria-label="Contact @amirsplder on Telegram">
    <span class="tg-ico" aria-hidden="true">${ICON("telegram")}</span>
    <span class="tg-text">
      <span class="tg-title">Contact Me</span>
      <span class="tg-handle">@amirsplder</span>
    </span>
  </a>

  <main class="auth-wrap" style="max-width: 600px; width: 100%;">
    <div class="card glass" style="text-align: center; padding: var(--space-2xl);">
      <div class="spider-logo" style="display: inline-flex; margin-bottom: var(--space-md);">${ICON("spider")}</div>
      <h1 class="title-neon" style="margin-top: var(--space-sm);">YOUR CONNECTION</h1>
      <p class="subtitle" style="max-width: 400px; margin: 0 auto var(--space-lg);">Open this page from your client's link, or paste your subscription ID below.</p>
      <form id="sub-form" class="sub-form" style="display: flex; gap: var(--space-md); max-width: 520px; margin: 0 auto; flex-wrap: wrap;">
        <input id="sub-input" class="field" style="flex: 1; min-width: 200px;" placeholder="subscription id (uuid)" autocomplete="off" />
        <button type="submit" class="btn btn-primary neon">${ICON("arrow_right")} Open</button>
      </form>
    </div>

    <div id="content" style="margin-top: var(--space-xl); width: 100%; max-width: 600px; margin-left: auto; margin-right: auto;"><!-- rendered here --></div>

    <footer class="footer">Spider Panel · VLESS / Reality · Xray Core</footer>
  </main>

  <script src="/assets/js/icons.js"></script>
  <script src="/assets/js/bg.js"></script>
  <script src="/assets/js/app.js"></script>
  <script>window.bootPage("sub");</script>
</body>
</html>
