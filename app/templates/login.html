{% extends "base.html" %}
{% block title %}Login - Spider Panel{% endblock %}

{% block content %}
<!-- Login Page - Standalone, no sidebar, no navigation -->
<main class="auth-wrap safe-top safe-bottom">
  <div class="auth-card glass">
    <div class="brand">
      <div class="spider-logo" aria-hidden="true">
        <svg viewBox="0 0 100 100" width="64" height="64">
          <g class="legs" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round">
            <path d="M50 50 L18 22 M50 50 L14 50 M50 50 L18 78 M50 50 L82 22 M50 50 L86 50 M50 50 L82 78"/>
          </g>
          <circle class="body" cx="50" cy="50" r="14" fill="currentColor"/>
          <circle cx="45" cy="46" r="2.4" fill="#0a0000"/>
          <circle cx="55" cy="46" r="2.4" fill="#0a0000"/>
        </svg>
      </div>
      <h1 class="title-neon">SPIDER PANEL</h1>
      <p class="subtitle">Xray Core Management</p>
    </div>
    <form id="login-form" class="auth-form" autocomplete="on">
      <label>Username
        <input id="login-username" type="text" autocomplete="username" required autofocus />
      </label>
      <label>Password
        <input id="login-password" type="password" autocomplete="current-password" required />
      </label>
      <button type="submit" class="btn btn-primary neon btn-min">ENTER</button>
      <p id="login-error" class="error-text" hidden></p>
    </form>
  </div>
</main>
{% endblock %}

{% block extra_scripts %}
<script>
  // Self-contained login handler. Uses native fetch only — it must NOT depend
  // on SPA globals (api/TOKEN/ME) because app.js is not loaded on this page,
  // and the base.html inline block can abort before defining window.api.
  (function () {
    "use strict";
    var form = document.getElementById("login-form");
    var errorEl = document.getElementById("login-error");
    if (!form) return;

    function showError(msg) {
      errorEl.textContent = msg || "Login failed. Please try again.";
      errorEl.hidden = false;
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      errorEl.hidden = true;
      var username = document.getElementById("login-username").value;
      var password = document.getElementById("login-password").value;
      var btn = form.querySelector("button[type=submit]");
      if (btn) { btn.disabled = true; btn.textContent = "…"; }

      try {
        var res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: username, password: password }),
        });

        var data = null;
        try { data = await res.json(); } catch (_) { /* non-JSON body */ }

        if (!res.ok) {
          var msg = (data && (data.detail || data.error)) ||
                    ("HTTP " + res.status);
          showError(typeof msg === "string" ? msg : JSON.stringify(msg));
          return;
        }

        // Success: store JWT + username, then go to the dashboard.
        if (data && data.access_token) {
          localStorage.setItem("spider_token", data.access_token);
          localStorage.setItem("spider_user", data.username || username);
        }
        window.location.href = "/dashboard";
      } catch (err) {
        // Network error or unexpected failure — never leak raw JS errors.
        showError("Cannot reach the server. Check your connection and try again.");
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = "ENTER"; }
      }
    });
  })();
</script>
{% endblock %}
