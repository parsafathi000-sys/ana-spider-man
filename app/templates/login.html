<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#070509" />
  <title>Spider Panel — Login</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='10' fill='%23ff2d55'/%3E%3C/svg%3E" />
</head>
<body>
  <canvas id="bg-canvas" aria-hidden="true"></canvas>
  <div class="bg-fallback" aria-hidden="true"></div>

  <a id="tg-fab" class="tg-fab" href="https://t.me/amirsplder" target="_blank" rel="noopener noreferrer" aria-label="Contact @amirsplder on Telegram">
    <span class="tg-ico" aria-hidden="true">${ICON("telegram")}</span>
    <span class="tg-text">
      <span class="tg-title">Contact Me</span>
      <span class="tg-handle">@amirsplder</span>
    </span>
  </a>

  <section class="auth-wrap">
    <div class="auth-card glass">
      <div class="brand">
        <div class="spider-logo">${ICON("spider")}</div>
        <h1 class="title-neon">SPIDER PANEL</h1>
        <p class="subtitle">Xray Core Management</p>
      </div>
      <form id="login-form" class="auth-form" autocomplete="on">
        <div class="field"><label class="lbl">Username</label><input id="username" name="username" type="text" autocomplete="username" required /></div>
        <div class="field password-wrap">
          <label class="lbl">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
          <button type="button" class="toggle-pw" aria-label="Show password">${ICON("eye")}</button>
        </div>
        <label class="remember"><input type="checkbox" id="remember" checked /> Remember me</label>
        <button type="submit" class="btn btn-primary neon btn-block">ENTER</button>
        <p id="login-error" class="error-text" style="margin-top:var(--space-md);min-height:18px"></p>
      </form>
    </div>
  </section>

  <script src="/assets/js/icons.js"></script>
  <script src="/assets/js/bg.js"></script>
  <script src="/assets/js/app.js"></script>
  <script>window.bootPage("login");</script>
</body>
</html>
