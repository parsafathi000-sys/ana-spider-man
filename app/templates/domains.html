{% extends "base.html" %}
{% block title %}Domains - Spider Panel{% endblock %}

{% block content %}
<div id="app-view" class="app-shell">
  <!-- Sidebar -->
  <aside class="sidebar glass" id="sidebar">
    <div class="side-brand">
      <span class="spider-mini" aria-hidden="true">
        <svg viewBox="0 0 32 32" fill="currentColor" width="24" height="24">
          <path d="M16 2 L6 10 L6 22 L16 30 L26 22 L26 10 Z M16 6 L22 14 L22 22 L16 28 L10 22 L10 14 Z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
          <circle cx="16" cy="16" r="4" fill="currentColor"/>
        </svg>
      </span> SPIDER
    </div>
    <nav class="nav">
      <a class="nav-item" data-view="dashboard"><span class="ico" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span> Dashboard</a>
      <a class="nav-item" data-view="users"><span class="ico" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span> Users</a>
      <a class="nav-item" data-view="inbounds"><span class="ico" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span> Inbounds</a>
      <a class="nav-item active" data-view="domains"><span class="ico" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></span> Domains</a>
      <a class="nav-item" data-view="system"><span class="ico" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span> System</a>
      <a class="nav-item" data-view="logs"><span class="ico" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M4 13h16"/><path d="M4 19h16"/></svg></span> Xray Logs</a>
      <a class="nav-item" data-view="settings"><span class="ico" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span> Settings</a>
    </nav>
    <div class="side-foot">
      <button id="theme-toggle" class="btn btn-ghost" title="Toggle theme"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg> Theme</button>
      <button id="logout-btn" class="btn btn-ghost danger"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Logout</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="topbar glass">
      <button id="menu-btn" class="btn btn-ghost only-mobile" aria-label="Menu"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <h2 id="view-title">Domains</h2>
      <div class="topbar-right">
        <span id="xray-status" class="pill">Xray: …</span>
        <span id="me-name" class="me"></span>
      </div>
    </header>

    <div class="content" id="content">
      <!-- Domains content loads here -->
    </div>
  </main>
</div>

<!-- Modal -->
<div id="modal" class="modal-backdrop" hidden>
  <div class="modal glass" id="modal-card"></div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
// Domains view renderer
async function renderDomains() {
  try {
    const domains = await api('/domains');
    const root = document.getElementById('content');
    
    const rows = domains.map(d => `
      <tr>
        <td data-label="Domain">${esc(d.domain)}</td>
        <td data-label="Verified">${d.verified ? '<span class="pill on">Yes</span>' : '<span class="pill off">No</span>'}</td>
        <td data-label="Active"><span class="badge ${d.is_active ? 'active' : 'disabled'}">${d.is_active ? 'Active' : 'Inactive'}</span></td>
        <td data-label="SSL">${d.ssl_cert_path ? '<span class="pill on">Ready</span>' : '<span class="pill off">Missing</span>'}</td>
        <td data-label="Actions">
          <div class="row-actions">
            <button class="btn btn-sm btn-min" data-act="set-active" data-domain="${d.domain}" title="Set Active">${d.is_active ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>' : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>'}</button>
            <button class="btn btn-sm btn-min" data-act="verify" data-domain="${d.domain}" title="Verify"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></button>
            <button class="btn btn-sm btn-min danger" data-act="delete" data-domain="${d.domain}" title="Delete"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
          </div>
        </td>
      </tr>
    `).join('');
    
    root.innerHTML = `
      <div class="panel glass">
        <div class="panel-head">
          <h3>DOMAINS</h3>
          <span class="spacer"></span>
          <button class="btn btn-primary neon btn-sm" id="add-domain"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Domain</button>
        </div>
        <table class="table">
          <thead>
            <tr>
              <th>Domain</th>
              <th>Verified</th>
              <th>Active</th>
              <th>SSL</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;
    
    document.getElementById('add-domain').onclick = () => openDomainModal();
    
    root.querySelectorAll('[data-act="set-active"]').forEach(btn => {
      btn.onclick = async () => {
        try {
          await api('/domains/set-active', { method: 'POST', body: { domain: btn.dataset.domain } });
          toast('Active domain set');
          renderDomains();
        } catch (e) { toast(e.message, 'err'); }
      };
    });
    
    root.querySelectorAll('[data-act="verify"]').forEach(btn => {
      btn.onclick = async () => {
        try {
          await api(`/domains/${btn.dataset.domain}/verify`, { method: 'POST' });
          toast('Domain verified');
          renderDomains();
        } catch (e) { toast(e.message, 'err'); }
      };
    });
    
    root.querySelectorAll('[data-act="delete"]').forEach(btn => {
      btn.onclick = async () => {
        if (!confirm('Delete this domain?')) return;
        try {
          await api(`/domains/${btn.dataset.domain}`, { method: 'DELETE' });
          toast('Domain deleted');
          renderDomains();
        } catch (e) { toast(e.message, 'err'); }
      };
    });
    
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="panel glass"><p class="error-text">${e.message}</p></div>`;
  }
}

// Domain modal
function openDomainModal(domain = null) {
  const isEdit = !!domain;
  const modal = document.getElementById('modal');
  const card = document.getElementById('modal-card');
  
  if (isEdit) {
    api(`/domains/${domain}`).then(d => {
      card.innerHTML = buildDomainForm(d);
      bindDomainForm(domain);
      modal.hidden = false;
    }).catch(e => toast(e.message, 'err'));
  } else {
    card.innerHTML = buildDomainForm({});
    bindDomainForm(null);
    modal.hidden = false;
  }
}

function buildDomainForm(d) {
  return `
    <h3>${isEdit ? 'Edit Domain' : 'Add Domain'}</h3>
    <form id="domain-form" style="display:flex;flex-direction:column;gap:12px">
      <div class="field">
        <label>Domain<input type="text" name="domain" value="${esc(d.domain || '')}" ${isEdit ? 'readonly' : 'required'} placeholder="example.com"></label>
      </div>
      <div class="field">
        <label>SSL Cert Path<input type="text" name="ssl_cert_path" value="${esc(d.ssl_cert_path || '')}" placeholder="/app/data/ssl/cert.pem"></label>
      </div>
      <div class="field">
        <label>SSL Key Path<input type="text" name="ssl_key_path" value="${esc(d.ssl_key_path || '')}" placeholder="/app/data/ssl/key.pem"></label>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn modal-close">Cancel</button>
        <button type="submit" class="btn btn-primary neon">${isEdit ? 'Save' : 'Add'}</button>
      </div>
    </form>
  `;
}

function bindDomainForm(domain) {
  const modal = document.getElementById('modal');
  const form = document.getElementById('domain-form');
  const isEdit = !!domain;
  
  modal.querySelector('.modal-close').onclick = () => { modal.hidden = true; };
  
  form.onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(form);
    const body = {
      domain: fd.get('domain'),
      ssl_cert_path: fd.get('ssl_cert_path') || null,
      ssl_key_path: fd.get('ssl_key_path') || null,
    };
    
    try {
      if (isEdit) {
        await api(`/domains/${domain}`, { method: 'PUT', body });
        toast('Domain updated');
      } else {
        await api('/domains', { method: 'POST', body });
        toast('Domain added');
      }
      modal.hidden = true;
      renderDomains();
    } catch (e) { toast(e.message, 'err'); }
  };
}

window.initDomains = renderDomains;
</script>
{% endblock %}
