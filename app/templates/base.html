<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0000">
  <title>{% block title %}Spider Panel{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cg stroke='%23ff1a3c' stroke-width='2' fill='none' stroke-linecap='round'%3E%3Cpath d='M16 16 L6 7 M16 16 L4 16 M16 16 L6 25 M16 16 L26 7 M16 16 L28 16 M16 16 L26 25'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%23ff1a3c'/%3E%3C/svg%3E" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            neon: '#ff1a3c',
            'neon-soft': '#ff5a73',
            'neon-deep': '#b3001b',
            'bg-0': '#07000a',
            'bg-1': '#0e0008',
            'bg-2': '#150010',
            glass: 'rgba(28, 4, 12, 0.55)',
            'glass-brd': 'rgba(255, 26, 60, 0.28)',
            txt: '#ffe9ee',
            'txt-dim': '#c79aa6',
            ok: '#2bff88',
            warn: '#ffd23f',
            bad: '#ff3b5c',
          },
          fontFamily: {
            sans: ['Space Grotesk', 'system-ui', '-apple-system', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          },
          animation: {
            'spin-slow': 'spin 14s linear infinite',
            'pulse-glow': 'pulseGlow 9s ease-in-out infinite alternate',
            'float-up': 'floatUp linear infinite',
            'tg-glow': 'tgGlow 4.2s ease-in-out infinite',
            'slide-in': 'slideIn 0.25s ease',
            'fade-in': 'fadeIn 0.3s ease',
            'scale-in': 'scaleIn 0.2s ease',
          },
          keyframes: {
            pulseGlow: {
              'from': { opacity: '0.55' },
              'to': { opacity: '1' },
            },
            floatUp: {
              'from': { transform: 'translateY(0) scale(1)', opacity: '0' },
              '10%': { opacity: '0.8' },
              'to': { transform: 'translateY(-110vh) scale(0.4)', opacity: '0' },
            },
            tgGlow: {
              '0%, 100%': { boxShadow: '0 8px 30px rgba(0,0,0,0.35), 0 0 12px rgba(0,153,255,0.28), 0 0 24px rgba(0,153,255,0.16)' },
              '50%': { boxShadow: '0 8px 30px rgba(0,0,0,0.35), 0 0 18px rgba(0,153,255,0.45), 0 0 36px rgba(0,153,255,0.26)' },
            },
            slideIn: {
              'from': { transform: 'translateX(40px)', opacity: '0' },
              'to': { transform: 'none', opacity: '1' },
            },
            fadeIn: {
              'from': { opacity: '0' },
              'to': { opacity: '1' },
            },
            scaleIn: {
              'from': { transform: 'scale(0.95)', opacity: '0' },
              'to': { transform: 'scale(1)', opacity: '1' },
            },
          },
        },
      },
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      color: #ffe9ee;
      background: radial-gradient(1200px 800px at 80% -10%, #150010, #07000a) fixed;
      overflow-x: hidden;
      transition: background 0.4s, color 0.4s;
    }
    [data-theme="light"] {
      --neon: #e60023;
      --neon-soft: #ff4d68;
      --neon-deep: #a30016;
      --bg-0: #f3eef0;
      --bg-1: #ffffff;
      --bg-2: #fbe9ee;
      --glass: rgba(255, 255, 255, 0.62);
      --glass-brd: rgba(230, 0, 35, 0.30);
      --txt: #2a0510;
      --txt-dim: #7a4452;
      --shadow-neon: 0 0 12px rgba(230, 0, 35, 0.35), 0 8px 30px rgba(0,0,0,0.10);
    }
    [data-theme="light"] body {
      background: radial-gradient(1200px 800px at 80% -10%, #fbe9ee, #f3eef0) fixed;
    }

    /* Animated background */
    .bg-grid, .bg-glow, .bg-particles { position: fixed; inset: 0; z-index: -3; pointer-events: none; }
    .bg-grid {
      background-image: linear-gradient(rgba(255,26,60,.06) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,26,60,.06) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: radial-gradient(circle at 50% 30%, #000 30%, transparent 80%);
      animation: gridmove 22s linear infinite;
    }
    @keyframes gridmove { to { background-position: 46px 46px; } }
    .bg-glow {
      background: radial-gradient(620px 620px at 12% 18%, rgba(255,26,60,.20), transparent 60%),
                  radial-gradient(520px 520px at 88% 82%, rgba(179,0,27,.18), transparent 60%);
      animation: pulseGlow 9s ease-in-out infinite alternate;
    }
    [data-theme="light"] .bg-glow { opacity: 0.6; }
    .bg-particles .dot {
      position: absolute; width: 4px; height: 4px; border-radius: 50%;
      background: var(--neon); box-shadow: 0 0 8px var(--neon);
      opacity: 0.7; animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      from { transform: translateY(0) scale(1); opacity: 0; }
      10% { opacity: 0.8; }
      to { transform: translateY(-110vh) scale(0.4); opacity: 0; }
    }

    /* Glass */
    .glass {
      background: var(--glass);
      border: 1px solid var(--glass-brd);
      border-radius: 16px;
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      box-shadow: var(--shadow-neon, 0 0 14px rgba(255, 26, 60, 0.55), 0 0 38px rgba(255, 26, 60, 0.22));
    }

    /* Buttons */
    .btn {
      cursor: pointer; border: 1px solid var(--glass-brd); color: var(--txt);
      background: rgba(255,26,60,.08); padding: 10px 16px; border-radius: 10px;
      font-weight: 600; letter-spacing: 1px; transition: 0.18s; font-size: 14px;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary.neon {
      background: linear-gradient(135deg, var(--neon), var(--neon-deep));
      border: none; color: #fff; box-shadow: var(--shadow-neon); width: 100%; padding: 13px;
      letter-spacing: 4px;
    }
    .btn-primary.neon:hover { box-shadow: 0 0 22px var(--neon); }
    .btn-ghost { background: transparent; }
    .btn-ghost.danger { color: var(--bad); border-color: rgba(255,59,92,.4); }
    .btn-sm { padding: 6px 10px; font-size: 12px; }
    .btn-ok { background: rgba(43,255,136,.12); border-color: rgba(43,255,136,.4); color: var(--ok); }
    .btn-min { min-height: 48px; min-width: 48px; display: flex; align-items: center; justify-content: center; }

    /* Forms */
    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
    .field label { font-size: 12px; color: var(--txt-dim); letter-spacing: 1px; }
    .field input, .field select, .field textarea {
      background: rgba(0,0,0,.25); border: 1px solid var(--glass-brd); color: var(--txt);
      padding: 12px 14px; border-radius: 8px; font-size: 14px; outline: none; font-family: inherit;
    }
    [data-theme="light"] .field input, [data-theme="light"] .field select, [data-theme="light"] .field textarea {
      background: rgba(255,255,255,.7);
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--neon); box-shadow: 0 0 0 2px rgba(255,26,60,.22);
    }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Tables -> Cards on mobile */
    .table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .table th, .table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid rgba(255,26,60,.10); }
    .table th { color: var(--txt-dim); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
    .table tr:hover td { background: rgba(255,26,60,.05); }
    .badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; border: 1px solid var(--glass-brd); }
    .badge.active { color: var(--ok); border-color: rgba(43,255,136,.4); }
    .badge.expired, .badge.disabled { color: var(--bad); border-color: rgba(255,59,92,.4); }
    .row-actions { display: flex; gap: 6px; flex-wrap: wrap; }

    /* Modal */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 90; padding: 16px; display: none; }
    .modal-backdrop:not([hidden]) { display: grid; place-items: center; }
    .modal { width: min(560px, 100%); max-height: 90vh; overflow: auto; padding: 22px; }
    .modal h3 { margin: 0 0 16px; letter-spacing: 2px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }

    /* Toast */
    .toast-wrap { position: fixed; bottom: 18px; right: 18px; display: flex; flex-direction: column; gap: 10px; z-index: 80; }
    .toast { padding: 12px 16px; border-radius: 10px; min-width: 220px; font-size: 14px; animation: slideIn 0.25s ease; }
    .toast.ok { border-color: rgba(43,255,136,.5); color: var(--ok); }
    .toast.err { border-color: rgba(255,59,92,.5); color: var(--bad); }

    /* Code box */
    .codebox { width: 100%; min-height: 90px; font-family: ui-monospace, menlo, monospace; font-size: 12px;
      background: rgba(0,0,0,.35); color: var(--neon-soft); border: 1px solid var(--glass-brd);
      border-radius: 8px; padding: 10px; white-space: pre-wrap; word-break: break-all; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }

    /* Safe area for mobile */
    .safe-top { padding-top: env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    .safe-left { padding-left: env(safe-area-inset-left); }
    .safe-right { padding-right: env(safe-area-inset-right); }

    /* Login page specific */
    .auth-wrap { min-height: 100vh; display: grid; place-items: center; padding: 18px; }
    .auth-card { width: min(420px, 100%); padding: 30px 26px; text-align: center; }
    .brand .spider-logo { color: var(--neon); filter: drop-shadow(0 0 10px var(--neon)); margin-bottom: 6px; }
    .brand .spider-logo svg .legs { animation: spin 14s linear infinite; transform-origin: 50% 50%; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .title-neon {
      font-size: 30px; letter-spacing: 6px; margin: 4px 0 0;
      color: var(--txt);
      text-shadow: 0 0 8px var(--neon), 0 0 22px var(--neon-deep);
    }
    .subtitle { color: var(--txt-dim); letter-spacing: 3px; font-size: 12px; text-transform: uppercase; margin: 4px 0 22px; }
    .auth-form { display: flex; flex-direction: column; gap: 14px; text-align: left; }
    .auth-form label { font-size: 12px; color: var(--txt-dim); display: flex; flex-direction: column; gap: 6px; letter-spacing: 1px; }
    .auth-form input {
      background: rgba(0,0,0,.25); border: 1px solid var(--glass-brd); color: var(--txt);
      padding: 12px 14px; border-radius: 10px; font-size: 15px; outline: none; transition: 0.2s;
    }
    [data-theme="light"] .auth-form input { background: rgba(255,255,255,.7); }
    .auth-form input:focus { border-color: var(--neon); box-shadow: 0 0 0 2px rgba(255,26,60,.25); }
    .error-text { color: var(--bad); font-size: 13px; margin: 0; }

    /* Telegram contact widget (floating, top-left) */
    .tg-contact {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 80;
      display: flex;
      align-items: center;
      gap: 12px;
      width: 200px;
      min-height: 52px;
      padding: 12px 14px;
      cursor: pointer;
      text-decoration: none;
      color: #eaf6ff;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 18px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35),
                  0 0 14px rgba(0, 153, 255, 0.30),
                  0 0 28px rgba(0, 153, 255, 0.18);
      transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease,
                  border-color 0.3s ease, backdrop-filter 0.3s ease;
      user-select: none;
      -webkit-user-select: none;
      animation: tgGlow 4.2s ease-in-out infinite;
    }
    @keyframes tgGlow {
      0%, 100% { box-shadow: 0 8px 30px rgba(0,0,0,.35), 0 0 12px rgba(0,153,255,.28), 0 0 24px rgba(0,153,255,.16); }
      50%      { box-shadow: 0 8px 30px rgba(0,0,0,.35), 0 0 18px rgba(0,153,255,.45), 0 0 36px rgba(0,153,255,.26); }
    }
    .tg-contact .tg-ico {
      flex: 0 0 auto;
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: linear-gradient(145deg, #2bb7ff, #0099ff);
      box-shadow: 0 0 10px rgba(0, 153, 255, 0.55);
      color: #fff;
    }
    .tg-contact .tg-ico svg { width: 18px; height: 18px; display: block; }
    .tg-contact .tg-text { display: flex; flex-direction: column; line-height: 1.15; min-width: 0; }
    .tg-contact .tg-title { font-size: 14px; font-weight: 700; letter-spacing: 0.2px; }
    .tg-contact .tg-handle { font-size: 12px; color: #7fd3ff; font-weight: 500; }
    .tg-contact:hover,
    .tg-contact:focus-visible {
      transform: scale(1.06);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(120, 200, 255, 0.45);
      backdrop-filter: blur(26px);
      -webkit-backdrop-filter: blur(26px);
      box-shadow: 0 10px 36px rgba(0, 0, 0, 0.4),
                  0 0 22px rgba(0, 153, 255, 0.65),
                  0 0 44px rgba(0, 153, 255, 0.4);
      outline: none;
    }
    @media (max-width: 430px) {
      .tg-contact {
        width: 160px;
        top: 14px;
        left: 14px;
        padding: 10px 12px;
      }
      .tg-contact .tg-title { font-size: 13px; }
      .tg-contact .tg-handle { font-size: 11px; }
    }

    /* Mobile-first app shell */
    .app-shell { display: grid; grid-template-columns: 1fr; min-height: 100vh; }
    .main { display: flex; flex-direction: column; min-width: 0; margin-left: 0; }
    .topbar { margin: 12px 12px 0; padding: 12px 18px; display: flex; align-items: center; gap: 12px; }
    .topbar h2 { margin: 0; font-size: 18px; letter-spacing: 2px; }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .me { color: var(--txt-dim); font-size: 13px; }
    .pill { font-size: 12px; padding: 5px 10px; border-radius: 20px; border: 1px solid var(--glass-brd); }
    .pill.on { color: var(--ok); border-color: rgba(43,255,136,.4); }
    .pill.off { color: var(--bad); border-color: rgba(255,59,92,.4); }

    .content { padding: 18px 14px 100px; width: 100%; }

    /* Grid / Cards */
    .grid { display: grid; gap: 14px; }
    .cards { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
    .card { padding: 16px; border-radius: 16px; }
    .card .k { font-size: 12px; color: var(--txt-dim); letter-spacing: 1px; text-transform: uppercase; }
    .card .v { font-size: 28px; font-weight: 800; margin-top: 6px; color: var(--neon); text-shadow: 0 0 12px rgba(255,26,60,.5); }
    .card .sub { font-size: 12px; color: var(--txt-dim); margin-top: 4px; }

    .panel { padding: 18px; margin-top: 16px; }
    .panel h3 { margin: 0 0 14px; letter-spacing: 2px; font-size: 15px; color: var(--txt); }
    .panel-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .panel-head h3 { margin: 0; }
    .panel-head .spacer { flex: 1; }

    /* Settings toggle */
    .setting-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 4px; border-bottom: 1px solid rgba(255,26,60,.12); }
    .setting-row:last-child { border-bottom: none; }
    .setting-row .k { font-weight: 600; }
    .setting-row .sub { color: var(--txt-dim); font-size: 12px; margin-top: 2px; max-width: 520px; }
    .switch { position: relative; display: inline-block; width: 52px; height: 28px; flex: 0 0 auto; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch .slider { position: absolute; cursor: pointer; inset: 0; background: rgba(255,26,60,.18);
      border: 1px solid var(--glass-brd); border-radius: 999px; transition: 0.25s; }
    .switch .slider::before { content: ""; position: absolute; height: 20px; width: 20px; left: 4px; top: 3px;
      background: var(--txt-dim); border-radius: 50%; transition: 0.25s; }
    .switch input:checked + .slider { background: var(--neon); box-shadow: var(--shadow-neon); }
    .switch input:checked + .slider::before { transform: translateX(24px); background: #fff; }

    /* Mobile Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      background: var(--glass);
      border-top: 1px solid var(--glass-brd);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      padding: 8px env(safe-area-inset-right) 8px env(safe-area-inset-left);
      box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
    }
    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 4px;
      background: transparent;
      border: none;
      color: var(--txt-dim);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.2s, transform 0.15s;
      min-height: 56px;
    }
    .nav-btn svg { width: 22px; height: 22px; }
    .nav-btn.active { color: var(--neon); text-shadow: 0 0 8px var(--neon); }
    .nav-btn:active { transform: scale(0.95); }
    .nav-btn:focus-visible { outline: 2px solid var(--neon); outline-offset: 2px; border-radius: 8px; }

    /* Floating Action Button */
    .fab {
      position: fixed;
      bottom: 90px;
      right: 16px;
      z-index: 90;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--neon), var(--neon-deep));
      border: none;
      color: #fff;
      box-shadow: var(--shadow-neon), 0 4px 20px rgba(0,0,0,0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .fab:hover { transform: scale(1.1); box-shadow: 0 0 30px var(--neon); }
    .fab svg { width: 24px; height: 24px; }

    /* Desktop sidebar visible */
    @media (min-width: 821px) {
      .app-shell { grid-template-columns: 240px 1fr; }
      .sidebar { position: sticky; top: 12px; height: calc(100vh - 24px); margin: 12px; transform: none; }
      .only-mobile { display: none; }
      .main { margin-left: 0; }
      .bottom-nav { display: none; }
    }

    /* Mobile adjustments */
    @media (max-width: 820px) {
      .sidebar { position: fixed; z-index: 60; left: 0; top: 0; bottom: 0; width: 240px; transform: translateX(-110%); transition: transform 0.25s; margin: 0; border-radius: 0; height: 100vh; }
      .sidebar.open { transform: none; }
      .only-mobile { display: inline-flex; }
      .field-row { grid-template-columns: 1fr; }
      .topbar h2 { font-size: 15px; }
      .me { display: none; }
      .table { font-size: 12px; }
      .table thead { display: none; }
      .table, .table tbody, .table tr, .table td { display: block; width: 100%; }
      .table tr { margin-bottom: 12px; border: 1px solid var(--glass-brd); border-radius: 12px; overflow: hidden; }
      .table td { border: none; border-bottom: 1px solid rgba(255,26,60,.08); display: flex; justify-content: space-between; gap: 12px; }
      .table td::before { content: attr(data-label); color: var(--txt-dim); font-size: 11px; text-transform: uppercase; }
      .content { padding: 12px 10px 100px; }
      .cards { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
      .card .v { font-size: 24px; }
      .fab { bottom: 80px; }
    }

    /* Extra small mobile */
    @media (max-width: 360px) {
      .tg-contact { width: 140px; top: 12px; left: 12px; }
      .tg-contact .tg-title { font-size: 12px; }
      .tg-contact .tg-handle { font-size: 10px; }
    }

    {% block extra_styles %}{% endblock %}
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <!-- Animated background -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>
  <div class="bg-particles" id="particles" aria-hidden="true"></div>

  <!-- Floating Telegram Contact Button -->
  <a class="tg-contact" href="https://t.me/amirsplder" target="_blank" rel="noopener noreferrer" aria-label="Contact me on Telegram: @amirsplder">
    <span class="tg-ico" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l10.66-4.12c.73-.33 1.43.18 1.15 1.3l-2.32 10.94c-.21 1.02-.85 1.27-1.73.78l-3.46-2.55-1.57 1.51c-.17.17-.31.31-.62.31z"/>
      </svg>
    </span>
    <span class="tg-text">
      <span class="tg-title">Contact Me</span>
      <span class="tg-handle">@amirsplder</span>
    </span>
  </a>

  {% block content %}{% endblock %}

  <!-- Toast container -->
  <div id="toast-wrap" class="toast-wrap"></div>

  <script>
    // Generate background particles
    (function() {
      const container = document.getElementById('particles');
      if (!container) return;
      for (let i = 0; i < 18; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.style.left = Math.random() * 100 + 'vw';
        dot.style.animationDuration = (15 + Math.random() * 15) + 's';
        dot.style.animationDelay = Math.random() * 20 + 's';
        container.appendChild(dot);
      }
    })();

    // Toast helper
    window.toast = function(msg, kind = 'ok') {
      const wrap = document.getElementById('toast-wrap');
      const el = document.createElement('div');
      el.className = `toast glass ${kind}`;
      el.textContent = msg;
      wrap.appendChild(el);
      setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3200);
    };

    // Theme toggle
    const themeToggle = document.getElementById('theme-toggle');
    if (themeToggle) {
      themeToggle.onclick = () => {
        const html = document.documentElement;
        const isDark = html.getAttribute('data-theme') === 'dark';
        html.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
      };
      // Load saved theme
      const saved = localStorage.getItem('theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    }

    // CSRF token
    function csrfToken() {
      let t = localStorage.getItem('spider_csrf');
      if (!t) {
        t = Array.from(crypto.getRandomValues(new Uint8Array(16)))
            .map(b => b.toString(16).padStart(2, '0')).join('');
        localStorage.setItem('spider_csrf', t);
      }
      return t;
    }

    // API helper
    window.api = async function(path, opts = {}) {
      const headers = { 'Content-Type': 'application/json', 'X-Requested-With': 'SpiderSPA' };
      const token = localStorage.getItem('spider_token');
      if (token) headers['Authorization'] = 'Bearer ' + token;
      if (opts.method && opts.method !== 'GET') headers['X-CSRF-Token'] = csrfToken();
      let body;
      if (opts.form) {
        body = new URLSearchParams(opts.form).toString();
        headers['Content-Type'] = 'application/x-www-form-urlencoded';
      } else if (opts.body !== undefined) {
        body = JSON.stringify(opts.body);
      }
      const res = await fetch('/api' + path, { method: opts.method || 'GET', headers, body });
      if (res.status === 401 && !path.includes('/auth/')) {
        logout(true);
        throw new Error('Session expired');
      }
      let data = null;
      try { data = await res.json(); } catch {}
      if (!res.ok) {
        const msg = (data && (data.detail || data.error)) || `HTTP ${res.status}`;
        throw new Error(typeof msg === 'string' ? msg : JSON.stringify(msg));
      }
      return data;
    };

    // Logout
    window.logout = function(expired = false) {
      localStorage.removeItem('spider_token');
      localStorage.removeItem('spider_user');
      const appView = document.getElementById('app-view');
      const loginView = document.getElementById('login-view');
      if (appView) appView.hidden = true;
      if (loginView) loginView.hidden = false;
      if (expired) toast('Session expired, please log in', 'err');
    };

    // Modal
    window.openModal = function(html) {
      document.getElementById('modal-card').innerHTML = html;
      document.getElementById('modal').hidden = false;
    };
    window.closeModal = function() {
      document.getElementById('modal').hidden = true;
      document.getElementById('modal-card').innerHTML = '';
    };
    document.addEventListener('click', (e) => {
      if (e.target.id === 'modal') closeModal();
      if (e.target.classList && e.target.classList.contains('modal-close')) closeModal();
    });

    // Copy to clipboard
    window.copyText = function(text, msg = 'Copied') {
      navigator.clipboard.writeText(text).then(() => toast(msg)).catch(() => toast('Failed to copy', 'err'));
    };

    // Format bytes
    window.fmtBytes = function(n) {
      n = Number(n) || 0;
      const u = ['B', 'KB', 'MB', 'GB', 'TB', 'PB'];
      let i = 0;
      while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
      return `${n.toFixed(2)} ${u[i]}`;
    };

    // Format date
    window.fmtDate = function(d) {
      if (!d) return '—';
      return new Date(d).toLocaleString();
    };

    // Escape HTML
    window.esc = function(str) {
      if (!str) return '';
      return String(str).replace(/[&<>"']/g, c => ({'&':'&','<':'<','>':'>','"':'"',"'":'&apos;'}[c]));
    };
  </script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
