<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0000" />
  <title>Spider Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="/assets/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E%F0%9F%95%B7%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <!-- animated background -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>
  <div class="bg-particles" id="particles" aria-hidden="true"></div>

  <!-- ===================== LOGIN ===================== -->
  <section id="login-view" class="auth-wrap">
    <div class="auth-card glass">
      <div class="brand">
        <div class="spider-logo" aria-hidden="true">
          <svg viewBox="0 0 100 100" width="64" height="64">
            <g class="legs" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round">
              <path d="M50 50 L18 22 M50 50 L14 50 M50 50 L18 78 M50 50 L82 22 M50 50 L86 50 M50 50 L82 78"/>
            </g>
            <circle class="body" cx="50" cy="50" r="14" fill="currentColor"/>
            <circle cx="45" cy="46" r="2.4" fill="#0a0000"/>
            <circle cx="55" cy="46" r="2.4" fill="#0a0000"/>
          </svg>
        </div>
        <h1 class="title-neon">SPIDER PANEL</h1>
        <p class="subtitle">Xray Core Management</p>
      </div>
      <form id="login-form" class="auth-form" autocomplete="on">
        <label>Username
          <input id="login-username" type="text" autocomplete="username" required />
        </label>
        <label>Password
          <input id="login-password" type="password" autocomplete="current-password" required />
        </label>
        <button type="submit" class="btn btn-primary neon">ENTER</button>
        <p id="login-error" class="error-text" hidden></p>
      </form>
    </div>
  </section>

  <!-- ===================== APP ===================== -->
  <div id="app-view" class="app-shell" hidden>
    <!-- Sidebar -->
    <aside class="sidebar glass" id="sidebar">
      <div class="side-brand">
        <span class="spider-mini">🕷️</span> SPIDER
      </div>
      <nav class="nav">
        <a class="nav-item active" data-view="dashboard"><span class="ico">▣</span> Dashboard</a>
        <a class="nav-item" data-view="users"><span class="ico">☻</span> Users</a>
        <a class="nav-item" data-view="inbounds"><span class="ico">⛓</span> Inbounds</a>
        <a class="nav-item" data-view="domains"><span class="ico">🌐</span> Domains</a>
        <a class="nav-item" data-view="subscription"><span class="ico">🔗</span> Subscriptions</a>
        <a class="nav-item" data-view="system"><span class="ico">⚙</span> System</a>
      </nav>
      <div class="side-foot">
        <button id="theme-toggle" class="btn btn-ghost" title="Toggle theme">◐ Theme</button>
        <button id="logout-btn" class="btn btn-ghost danger">⎋ Logout</button>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar glass">
        <button id="menu-btn" class="btn btn-ghost only-mobile">☰</button>
        <h2 id="view-title">Dashboard</h2>
        <div class="topbar-right">
          <span id="xray-status" class="pill">Xray: …</span>
          <span id="me-name" class="me"></span>
        </div>
      </header>

      <div class="content" id="content"><!-- views render here --></div>
    </main>
  </div>

  <!-- generic modal -->
  <div id="modal" class="modal-backdrop" hidden>
    <div class="modal glass" id="modal-card"></div>
  </div>

  <div id="toast-wrap" class="toast-wrap"></div>

  <script src="/assets/js/app.js"></script>
</body>
</html>
