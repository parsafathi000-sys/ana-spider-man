# Spider Panel — docker-compose (local dev / VPS)
# For Railway use railway.toml instead (Railway builds the Dockerfile directly).

services:
  spider-panel:
    build: .
    container_name: spider-panel
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      # --- Web ---
      HOST: "0.0.0.0"
      PORT: "${PORT:-8000}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      # --- Auth / secrets (CHANGE THESE) ---
      SECRET_KEY: "${SECRET_KEY:-please-change-this-secret}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-changeme123}"
      # --- Database: sqlite by default; set DATABASE_URL for postgres ---
      DATABASE_URL: "${DATABASE_URL:-sqlite+aiosqlite:///./data/spider.db}"
      # --- Xray ---
      XRAY_BINARY_PATH: "/usr/local/bin/xray"
      XRAY_PORT: "${XRAY_PORT:-443}"
      # --- Public link host (leave blank to auto-detect Railway TCP proxy) ---
      RAILWAY_TCP_PROXY_DOMAIN: "${RAILWAY_TCP_PROXY_DOMAIN:-}"
      RAILWAY_TCP_PROXY_PORT: "${RAILWAY_TCP_PROXY_PORT:-}"
      PUBLIC_URL: "${PUBLIC_URL:-}"
      DATA_DIR: "/app/data"
    volumes:
      - spider-data:/app/data

volumes:
  spider-data:
